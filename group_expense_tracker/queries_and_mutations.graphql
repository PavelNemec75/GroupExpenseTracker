query GetEventParticipants {
  getEventParticipants(eventId: "dbbdaaf9-0dfa-42a8-8e65-1432e4eae35d") {
      eventParticipantId
  }
}



query GetEventParticipants2 {
  getEventParticipants(eventId: "aeedfa7d-1a03-4147-aa56-22126dee230a") {
    eventParticipantId
    event {
      eventId
      eventName
      eventStartDate
      eventEndDate
      eventCreatedAt
    }
    participant {
      participantId
      participantEmail
      participantCreatedAt
    }
    eventParticipantRegisteredAt
  }
}





